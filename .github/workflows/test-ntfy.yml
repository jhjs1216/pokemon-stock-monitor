name: Test ntfy Notification

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Send test notification
        env:
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: |
          if [ -z "$NTFY_TOPIC_URL" ]; then
            echo "NTFY_TOPIC_URL secret is not set."
            exit 1
          fi

          curl -fsS \
            -H "Title: 포켓몬스토어 알림 테스트" \
            -H "Tags: bell" \
            -H "Priority: high" \
            --data-binary $'테스트 알림입니다.\n이 메시지가 휴대폰에 오면 ntfy 설정은 정상입니다.' \
            "$NTFY_TOPIC_URL"
