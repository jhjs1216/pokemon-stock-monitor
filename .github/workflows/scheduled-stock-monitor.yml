name: Scheduled Pokemon Store Stock Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pokemon-store-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock monitor
        env:
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
          SLEEP_MIN_SECONDS: "1"
          SLEEP_MAX_SECONDS: "2"
          ALERT_ON_FIRST_IN_STOCK: "true"
        run: python monitor.py

      - name: Save latest stock state
        run: |
          if [ -n "$(git status --porcelain -- .stock_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .stock_state.json
            git commit -m "Update stock monitor state"
            git push
          else
            echo "No state changes to commit."
          fi
